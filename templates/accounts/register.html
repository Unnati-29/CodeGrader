{% extends 'base.html' %}

{% block content %}

<div class="max-w-md mx-auto">

    <h1 class="text-4xl font-bold mb-6">
        Register
    </h1>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            class="input input-bordered w-full mb-4"
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="input input-bordered w-full mb-4"
        >

        <button class="btn btn-primary">
            Register
        </button>

    </form>

</div>

{% endblock %}
