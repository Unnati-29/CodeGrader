{% extends 'base.html' %}

{% block content %}

<div class="max-w-4xl mx-auto">

    <h1 class="text-4xl font-bold mb-8">
        Submit Solution
    </h1>
    
    <div class="mb-8 p-4 rounded-lg bg-slate-900 border border-slate-700">
        <p class="text-slate-400 text-sm">
            Supported Language
        </p>
        <p class="text-green-400 font-semibold">
            Python 3
        </p>
    </div>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="btn btn-primary mt-4">

            Submit

        </button>

    </form>

</div>

{% endblock %}
