{% extends 'base.html' %}

{% block content %}

<div class="max-w-4xl mx-auto mt-10">

    <h1 class="text-5xl font-bold mb-8">
        Submission Result
    </h1>

    <div class="bg-slate-800 rounded-xl p-8 border border-slate-700">

        <div class="mb-6">
            <p class="text-slate-400">
                Score
            </p>

            <h2 class="text-4xl font-bold text-green-400">
                {{ submission.score }}
            </h2>
        </div>

        <div>
            <p class="text-slate-400 mb-2">
                Feedback
            </p>

            <div class="bg-slate-900 p-4 rounded-lg">
                <pre>{{ submission.feedback }}</pre>
            </div>
        </div>

    </div>

    <a href="/"
       class="inline-block mt-6 px-6 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-700">
        Back to Assignments
    </a>

</div>

{% endblock %}
