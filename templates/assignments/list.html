{% extends 'base.html' %}

{% block content %}

<div class="max-w-5xl mx-auto mt-10">

    <div class="flex justify-between items-center mb-8">

        <h1 class="text-4xl font-bold">
            Assignments
        </h1>

        <a href="{% url 'assignment_create' %}"
           class="bg-blue-600 px-4 py-2 rounded-lg">
            Create Assignment
        </a>

    </div>

    {% for assignment in assignments %}

    <div class="border rounded-xl p-5 mb-5 shadow">

        <h2 class="text-2xl font-semibold mb-2">

            <a href="{% url 'assignment_detail' assignment.id %}"  class="hover:text-blue-400 transition">
                {{ assignment.title }}
            </a>

        </h2>

        <p class="mt-2 text-gray-300">
            {{ assignment.description }}
        </p>

        <p class="mt-3">
            Marks: {{ assignment.marks }}
        </p>

        <p class="mt-2 text-gray-400">
            Deadline: {{ assignment.deadline|date:"d M Y" }}
        </p>

    </div>

    {% endfor %}

</div>

{% endblock %}
