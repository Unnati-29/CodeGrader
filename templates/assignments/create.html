{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto px-6">
    <div class="mb-8">
        <h1 class="text-4xl font-bold">Create Assignment</h1>
        <p class="text-slate-400 mt-2">Fill in the details and add test cases</p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- Title -->
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Title</label>
            <input type="text" name="title" required
                   class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500"
                   placeholder="e.g. Reverse a Linked List">
        </div>

        <!-- Description -->
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
            <textarea name="description" required rows="4"
                      class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500"
                      placeholder="Describe the problem..."></textarea>
        </div>

        <!-- Marks + Deadline -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Marks</label>
                <input type="number" name="marks" required min="1"
                       class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500"
                       placeholder="10">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Deadline</label>
                <input type="datetime-local" name="deadline" required
                       class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
            </div>
        </div>

        <!-- Test Cases -->
        <div>
            <div class="flex justify-between items-center mb-3">
                <label class="block text-sm font-medium text-slate-300">Test Cases</label>
                <button type="button" onclick="addTestCase()"
                        class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-sm transition">
                    + Add Test Case
                </button>
            </div>

            <div id="testcases-container" class="space-y-3">
                <!-- Test case 1 by default -->
                <div class="testcase bg-slate-800 border border-slate-700 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-medium text-indigo-400">Test Case 1</span>
                        <button type="button" onclick="removeTestCase(this)"
                                class="text-red-400 hover:text-red-300 text-sm">Remove</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">Input</label>
                            <textarea name="input_data[]" rows="2" required
                                      class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-indigo-500"
                                      placeholder="5"></textarea>
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">Expected Output</label>
                            <textarea name="expected_output[]" rows="2" required
                                      class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-indigo-500"
                                      placeholder="120"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit"
                class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-semibold py-3 rounded-lg transition text-lg">
            Create Assignment
        </button>
    </form>
</div>

<script>
let count = 1;

function addTestCase() {
    count++;
    const container = document.getElementById('testcases-container');
    const div = document.createElement('div');
    div.className = 'testcase bg-slate-800 border border-slate-700 rounded-lg p-4';
    div.innerHTML = `
        <div class="flex justify-between items-center mb-3">
            <span class="text-sm font-medium text-indigo-400">Test Case ${count}</span>
            <button type="button" onclick="removeTestCase(this)"
                    class="text-red-400 hover:text-red-300 text-sm">Remove</button>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-xs text-slate-400 mb-1 block">Input</label>
                <textarea name="input_data[]" rows="2" required
                          class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-indigo-500"
                          placeholder="5"></textarea>
            </div>
            <div>
                <label class="text-xs text-slate-400 mb-1 block">Expected Output</label>
                <textarea name="expected_output[]" rows="2" required
                          class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-indigo-500"
                          placeholder="120"></textarea>
            </div>
        </div>
    `;
    container.appendChild(div);
}

function removeTestCase(btn) {
    const testcases = document.querySelectorAll('.testcase');
    if (testcases.length > 1) {
        btn.closest('.testcase').remove();
    } else {
        alert('At least one test case required!');
    }
}
</script>
{% endblock %}
